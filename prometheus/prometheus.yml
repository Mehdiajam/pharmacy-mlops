# Prometheus Configuration for MLOps Monitoring
# Scrapes metrics from FastAPI and Trainer API every 15 seconds
# Evaluates alerting rules every 15 seconds

global:
  scrape_interval: 15s       # Scrape targets every 15 seconds
  evaluation_interval: 15s   # Evaluate rules every 15 seconds
  external_labels:
    monitor: 'mlops-monitor'
    environment: 'production'

# Alertmanager configuration (optional, for alert routing)
alerting:
  alertmanagers:
    - static_configs:
        - targets: []

# Load rules once and periodically evaluate them
rule_files:
  - '/etc/prometheus/alerts.yml'

# Scrape configurations
scrape_configs:
  # Prometheus itself
  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  # FastAPI Prediction Service
  - job_name: 'fastapi'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['fastapi:8000']
        labels:
          service: 'prediction-api'
          version: '1.0.0'

  # Trainer API Service
  - job_name: 'trainer'
    scrape_interval: 15s
    scrape_timeout: 10s
    metrics_path: '/metrics'
    static_configs:
      - targets: ['trainer:8001']
        labels:
          service: 'trainer-api'
          version: '1.0.0'
